<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Draw a blue rectangle (canvas version)</title>
    </head>

    <body onload="main()">
    <canvas id="cnv1" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>
        <script src="../lib/cuon-matrix-cse160.js"></script>
        <script src="asg0.js"></script>

        <br>
        <label for="x">v1: x</label>
        <input
        type="number"
        id="x"
        name="x"
        required
        size="10" />

        <label for="y">y</label>
        <input
        type="number"
        id="y"
        name="y"
        required
        size="10" />
        <br>

        <label for="x2">v2: x</label>
        <input
        type="number"
        id="x2"
        name="x2"
        required
        size="10" />

        <label for="y2">y</label>
        <input
        type="number"
        id="y2"
        name="y2"
        required
        size="10" />
        <br>

        <input type="button" value="Draw" onclick="handleDrawEvent()" />

        <br><br>
        <label for="op">Operation:</label>

        <select name="op" id="op">
        <option value="Add">Add</option>
        <option value="Subtract">Subtract</option>
        <option value="Multiply">Multiply</option>
        <option value="Divide">Divide</option>
        <option value="Magnitude">Magnitude</option>
        <option value="Normalize">Normalize</option>
        <option value="angleBetween">Angle Between</option>
        <option value="Area">Area</option>
        </select>

        <label for="scalar">Scalar:</label>
        <input
        type="number"
        id="scalar"
        name="scalar"
        required
        size="10" />

        <br>
        <input type="button" value="Draw" onclick="handleDrawOperationEvent()" />

    </body>
</html>
